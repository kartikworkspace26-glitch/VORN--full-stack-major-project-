<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <!-- Antique gold luxury wordmark VORN -->
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C1A270" />
      <stop offset="50%" stop-color="#AC8A53" />
      <stop offset="100%" stop-color="#7A6034" />
    </linearGradient>
  </defs>
  <style>
    .wordmark {
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      font-size: 76px;
      font-weight: 500;
      letter-spacing: 0.38em;
      fill: url(#gold-grad);
      text-anchor: middle;
    }
    .tagline {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.45em;
      fill: #7A766F;
      text-anchor: middle;
      text-transform: uppercase;
    }
  </style>
  <text x="270" y="85" class="wordmark">VORN</text>
  <text x="270" y="122" class="tagline">Refined Luxury Fashion</text>
</svg>
